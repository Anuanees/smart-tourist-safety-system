<!DOCTYPE html>
<html>

<head>
  <title>Tourist Sign Up</title>

  <style>
    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #1d2671, #c33764);
      font-family: Poppins, Arial;
    }

    .box {
      background: white;
      padding: 30px;
      width: 360px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }

    button {
      background: #c33764;
      color: white;
      border: none;
      cursor: pointer;
    }

    a {
      text-align: center;
      display: block;
      margin-top: 10px;
    }

    .error {
      color: red;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Tourist Registration</h2>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="full_name" placeholder="Full Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="mobile" placeholder="Mobile Number" required>
      <input type="password" name="password" placeholder="Password" required>

      <button type="submit">Sign Up</button>
    </form>

    {% if messages %}
    {% for message in messages %}
    <p class="error">{{ message }}</p>
    {% endfor %}
    {% endif %}

    <a href="{% url 'login' %}">Already have an account?</a>
  </div>

</body>

</html>
