<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tourist Login | Smart Tourist Safety</title>

<style>
* {
  box-sizing: border-box;
  font-family: "Segoe UI", Arial, sans-serif;
}

body {
  margin: 0;
  height: 100vh;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
}

.login-box {
  background: white;
  padding: 30px;
  width: 360px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.login-box h2 {
  text-align: center;
  margin-bottom: 20px;
  color: #203a43;
}

input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  border: none;
  border-radius: 6px;
  background: #203a43;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0f2027;
}

.links {
  text-align: center;
  margin-top: 15px;
  font-size: 14px;
}

.links a {
  color: #203a43;
  text-decoration: none;
}

.error {
  color: red;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div class="login-box">
  <h2>Tourist Login</h2>

  <!-- Django Login Form -->
  <form method="POST">
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username / Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Login</button>
  </form>

  <!-- Error messages -->
  {% if messages %}
    {% for message in messages %}
      <p class="error">{{ message }}</p>
    {% endfor %}
  {% endif %}

  <div class="links">
    <p><a href="{% url 'index' %}">← Back to Home</a></p>
  </div>
</div>

</body>
</html>
