<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:Arial;
}
.card{
    background:white;
    padding:30px;
    width:360px;
    border-radius:12px;
}
h2{text-align:center;}
input,button{
    width:100%;
    padding:12px;
    margin-top:12px;
}
button{
    background:#1e3a8a;
    color:white;
    border:none;
}
.error{
    color:red;
    text-align:center;
}
</style>
</head>

<body>

<div class="card">
<h2>Admin Login</h2>

{% if messages %}
  {% for message in messages %}
    <p class="error">{{ message }}</p>
  {% endfor %}
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Admin Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>
</form>

</div>

</body>
</html>
