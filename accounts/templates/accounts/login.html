<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Tourist Safety System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1f3c 40%, #0f2c4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Animated background glows */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
        }

        body::before {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1e90ff, transparent);
            top: -150px;
            left: -150px;
        }

        body::after {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #00c6ff, transparent);
            bottom: -100px;
            right: -100px;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 20px;
            padding: 44px 40px;
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.04) inset;
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo / Header */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #1e90ff 0%, #00c6ff 100%);
            box-shadow: 0 8px 24px rgba(30, 144, 255, 0.35);
            margin-bottom: 18px;
            font-size: 28px;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            line-height: 1.3;
        }

        .brand p {
            margin-top: 6px;
            font-size: 13.5px;
            color: rgba(255, 255, 255, 0.45);
            font-weight: 400;
        }

        /* Alert messages */
        .messages {
            list-style: none;
            margin-bottom: 22px;
        }

        .messages li {
            background: rgba(255, 77, 77, 0.15);
            border: 1px solid rgba(255, 77, 77, 0.3);
            border-radius: 10px;
            padding: 11px 14px;
            font-size: 13.5px;
            color: #ff8080;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .messages li::before {
            content: '⚠';
            font-size: 14px;
        }

        /* Form */
        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .field label {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.2px;
        }

        .field input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.10);
            border-radius: 10px;
            color: #ffffff;
            font-size: 14.5px;
            font-family: inherit;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .field input:focus {
            border-color: rgba(30, 144, 255, 0.6);
            background: rgba(255, 255, 255, 0.09);
            box-shadow: 0 0 0 3px rgba(30, 144, 255, 0.12);
        }

        /* Submit button */
        .btn-login {
            margin-top: 6px;
            padding: 13px;
            background: linear-gradient(135deg, #1e90ff 0%, #0075e8 100%);
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.2px;
            box-shadow: 0 6px 20px rgba(30, 144, 255, 0.30);
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
        }

        .btn-login:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 10px 28px rgba(30, 144, 255, 0.40);
        }

        .btn-login:active {
            transform: translateY(0);
            box-shadow: 0 4px 14px rgba(30, 144, 255, 0.25);
        }

        /* Footer links */
        .footer-links {
            margin-top: 28px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-links a {
            font-size: 13.5px;
            color: rgba(255, 255, 255, 0.45);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #1e90ff;
        }

        .divider {
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.07);
            margin: 4px 0;
        }

        .footer-links .signup-link {
            color: rgba(255, 255, 255, 0.6);
        }

        .footer-links .signup-link a {
            color: #1e90ff;
            font-weight: 500;
        }

        .footer-links .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- Brand -->
            <div class="brand">
                <div class="brand-icon">🛡️</div>
                <h1>Smart Tourist Safety</h1>
                <p>Sign in to continue to your dashboard</p>
            </div>

            <!-- Error messages -->
            {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                <li>{{ message }}</li>
                {% endfor %}
            </ul>
            {% endif %}

            <!-- Login form -->
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}

                <div class="field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username"
                        autocomplete="username" required autofocus>
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password"
                        autocomplete="current-password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <!-- Footer -->
            <div class="footer-links">
                <p class="signup-link">New tourist? <a href="{% url 'tourist_signup' %}">Create an account</a></p>
                <hr class="divider">
                <a href="{% url 'index' %}">← Back to Home</a>
            </div>

        </div>
    </div>

</body>

</html>
