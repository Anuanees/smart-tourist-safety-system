services:
  - type: web
    name: tourist-safety-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn tourist_safety.wsgi --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a strong key
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "tourist-safety-api.onrender.com"
